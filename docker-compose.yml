services:
  pfa-radar-api:
    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: ${DATABASE_URL}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY}
      # Alias de compatibilidade: o serviço Python atual lê SERPAPI_KEY.
      SERPAPI_KEY: ${SERPAPI_API_KEY}
      RADAR_ACCESS_USER: ${RADAR_ACCESS_USER}
      RADAR_ACCESS_PASSWORD: ${RADAR_ACCESS_PASSWORD}
      PFA_PORTAL_SECRET: ${PFA_PORTAL_SECRET}
      PFA_PORTAL_PUBLIC_URL: ${PFA_PORTAL_PUBLIC_URL:-https://chatwoot-radar-api.phqoes.easypanel.host}
      PFA_DASHBOARD_ORIGINS: ${PFA_DASHBOARD_ORIGINS:-https://painel.pfa.adv.br}

    volumes:
      - pfa_radar_screenshots:/app/screenshots

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pfa_radar_screenshots:
