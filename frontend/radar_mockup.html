<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar Google Ads | PFA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans text-gray-800">
  <aside class="fixed inset-y-0 left-0 w-64 bg-gray-900 px-4 py-6 text-gray-300">
    <div class="mb-10 flex items-center gap-3 px-3">
      <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-blue-600 text-lg font-bold text-white">P</div>
      <div>
        <p class="text-sm font-semibold text-white">PFA Advogados</p>
        <p class="text-xs text-gray-500">Painel de gestão</p>
      </div>
    </div>

    <nav class="space-y-2">
      <a href="#" class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm hover:bg-gray-800">
        <i class="fa-solid fa-chart-pie w-5"></i>
        Visão Geral
      </a>
      <a href="#" class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm hover:bg-gray-800">
        <i class="fa-solid fa-users w-5"></i>
        CRM
      </a>
      <a href="#" class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm hover:bg-gray-800">
        <i class="fa-solid fa-scale-balanced w-5"></i>
        Jurídico
      </a>
      <a href="#" class="flex items-center gap-3 rounded-lg bg-gray-700 px-3 py-2.5 text-sm font-semibold text-white shadow-sm">
        <i class="fa-solid fa-radar w-5 text-blue-400"></i>
        Radar Concorrência
      </a>
      <a href="#" class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm hover:bg-gray-800">
        <i class="fa-solid fa-gear w-5"></i>
        Configurações
      </a>
    </nav>
  </aside>

  <main class="ml-64 min-h-screen p-6 lg:p-10">
    <header class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <p class="mb-1 text-sm font-medium text-blue-600">Inteligência competitiva</p>
        <h1 class="text-2xl font-bold tracking-tight text-gray-900">Radar Google Ads</h1>
      </div>
      <div class="inline-flex items-center gap-2 self-start rounded-full bg-green-100 px-4 py-2 text-sm font-semibold text-green-700 sm:self-auto">
        <i class="fa-solid fa-circle-check"></i>
        Saldo SerpApi: 250 / 250 buscas
      </div>
    </header>

    <section class="mb-8 rounded-2xl border border-gray-200 bg-white p-5 shadow-sm">
      <div class="grid grid-cols-1 gap-4 lg:grid-cols-4">
        <label class="block">
          <span class="mb-1.5 block text-xs font-semibold uppercase tracking-wide text-gray-500">Serviço</span>
          <select id="servico" class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
            <option>Lei Seca</option>
            <option>Suspensão da CNH</option>
            <option>Cassação da CNH</option>
          </select>
        </label>

        <label class="block">
          <span class="mb-1.5 block text-xs font-semibold uppercase tracking-wide text-gray-500">Cidade</span>
          <select id="cidade" class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
            <option>São Bernardo do Campo</option>
            <option>Santo André</option>
            <option>São Paulo</option>
          </select>
        </label>

        <label class="block">
          <span class="mb-1.5 block text-xs font-semibold uppercase tracking-wide text-gray-500">Dispositivo</span>
          <select id="dispositivo" class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
            <option>Mobile</option>
            <option>Desktop</option>
          </select>
        </label>

        <div class="flex items-end">
          <button id="btn-mapear" type="button" class="flex w-full items-center justify-center gap-2 rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-300 disabled:cursor-not-allowed disabled:opacity-70">
            <i class="fa-solid fa-magnifying-glass"></i>
            Mapear Concorrência
          </button>
        </div>
      </div>
    </section>

    <div id="mensagem-status" role="status" aria-live="polite" class="hidden"></div>

    <section>
      <div class="mb-4 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <h2 id="resultados-titulo" class="text-lg font-bold text-gray-900">Histórico de observações</h2>
          <p id="resultados-descricao" class="text-sm text-gray-500">Últimos anúncios observados em todas as pesquisas.</p>
        </div>

        <div role="group" aria-label="Visualização dos resultados" class="inline-flex self-start rounded-xl bg-gray-200 p-1">
          <button id="aba-atual" type="button" aria-pressed="false" class="rounded-lg px-3 py-2 text-sm font-semibold text-gray-600 transition hover:text-gray-900">
            Resultado desta busca
          </button>
          <button id="aba-historico" type="button" aria-pressed="true" class="rounded-lg bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm transition">
            Histórico
          </button>
        </div>
      </div>

      <div id="resultados-grid" aria-live="polite" class="grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3">
        <p class="col-span-full rounded-xl border border-gray-200 bg-white p-5 text-sm text-gray-500 shadow-sm">
          <i class="fa-solid fa-spinner fa-spin mr-2"></i>Carregando observações...
        </p>
      </div>
    </section>
  </main>

  <script>
    const API_BASE_URL = "https://chatwoot-radar-api.phqoes.easypanel.host";
    const botaoMapear = document.getElementById("btn-mapear");
    const iconeOriginal = '<i class="fa-solid fa-magnifying-glass"></i>';
    const resultadosGrid = document.getElementById("resultados-grid");
    const resultadosTitulo = document.getElementById("resultados-titulo");
    const resultadosDescricao = document.getElementById("resultados-descricao");
    const mensagemStatus = document.getElementById("mensagem-status");
    const abaAtual = document.getElementById("aba-atual");
    const abaHistorico = document.getElementById("aba-historico");
    const idArmazenado = Number(sessionStorage.getItem("pfaRadarSearchRunId"));
    let searchRunAtualId = Number.isSafeInteger(idArmazenado) && idArmazenado > 0
      ? idArmazenado
      : null;
    if (!searchRunAtualId) {
      sessionStorage.removeItem("pfaRadarSearchRunId");
    }
    let modoAtivo = searchRunAtualId ? "atual" : "historico";
    let sequenciaCarregamento = 0;

    function escaparHtml(valor) {
      return String(valor || "").replace(/[&<>\"']/g, (caractere) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;",
      })[caractere]);
    }

    function obterUrlSegura(valor) {
      try {
        const url = new URL(String(valor || ""));
        if (!['http:', 'https:'].includes(url.protocol)) {
          return null;
        }
        return escaparHtml(url.href);
      } catch (_) {
        return null;
      }
    }

    function mostrarStatus(mensagem, tipo = "sucesso") {
      const cores = {
        erro: "border-red-200 bg-red-50 text-red-700",
        processando: "border-blue-200 bg-blue-50 text-blue-700",
        sucesso: "border-green-200 bg-green-50 text-green-700",
      };
      mensagemStatus.className = `mb-6 rounded-xl border px-4 py-3 text-sm font-medium ${cores[tipo] || cores.sucesso}`;
      mensagemStatus.textContent = mensagem;
    }

    function atualizarAbas() {
      const atualSelecionada = modoAtivo === "atual";
      const classeBase = "rounded-lg px-3 py-2 text-sm font-semibold transition";
      const classeAtiva = "bg-white text-gray-900 shadow-sm";
      const classeInativa = "text-gray-600 hover:text-gray-900";

      abaAtual.className = `${classeBase} ${atualSelecionada ? classeAtiva : classeInativa}`;
      abaHistorico.className = `${classeBase} ${atualSelecionada ? classeInativa : classeAtiva}`;
      abaAtual.setAttribute("aria-pressed", String(atualSelecionada));
      abaHistorico.setAttribute("aria-pressed", String(!atualSelecionada));
    }

    function atualizarCabecalho(busca = null, totalExibido = null) {
      if (modoAtivo === "historico") {
        resultadosTitulo.textContent = "Histórico de observações";
        resultadosDescricao.textContent = "Últimos anúncios observados em todas as pesquisas.";
        return;
      }

      resultadosTitulo.textContent = "Resultado desta busca";
      if (!busca) {
        resultadosDescricao.textContent = "Faça uma pesquisa para visualizar somente os anúncios encontrados nela.";
        return;
      }

      const total = Number.isSafeInteger(totalExibido)
        ? totalExibido
        : Number(busca.ads_found) || 0;
      const rotuloTotal = total === 1 ? "1 anúncio observado" : `${total} anúncios observados`;
      resultadosDescricao.textContent = [
        busca.keyword,
        busca.location,
        busca.device,
        rotuloTotal,
      ].filter(Boolean).join(" · ");
    }

    function renderizarObservacoes(observacoes, mensagemVazia) {
      if (!observacoes.length) {
        resultadosGrid.innerHTML = '<p class="col-span-full rounded-xl border border-dashed border-gray-300 bg-white p-5 text-sm text-gray-500">' + escaparHtml(mensagemVazia) + '</p>';
        return;
      }

      resultadosGrid.innerHTML = observacoes.map((observacao) => {
        const titulo = escaparHtml(observacao.title || "Anúncio sem título");
        const descricao = escaparHtml(observacao.description || "Sem descrição disponível.");
        const anunciante = escaparHtml(observacao.advertiser || observacao.domain);
        const dominio = escaparHtml(observacao.domain || observacao.target_url);
        const contexto = [observacao.keyword, observacao.location, observacao.device]
          .filter(Boolean)
          .map(escaparHtml)
          .join(" · ");
        const data = observacao.observed_at
          ? new Date(observacao.observed_at).toLocaleString("pt-BR")
          : "Data não informada";
        const url = obterUrlSegura(observacao.target_url);
        const linkLanding = url
          ? '<a href="' + url + '" target="_blank" rel="noopener noreferrer" class="shrink-0 text-sm font-semibold text-blue-600 hover:text-blue-800">Abrir landing page <i class="fa-solid fa-arrow-up-right-from-square ml-1 text-xs"></i></a>'
          : '<span class="shrink-0 text-xs font-medium text-gray-400">Landing indisponível</span>';

        return '<article class="overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-sm">'
          + '<div class="bg-gradient-to-br from-slate-800 to-slate-600 p-5 text-white">'
          + '<p class="text-xs font-semibold uppercase tracking-wide text-blue-200">' + anunciante + '</p>'
          + '<p class="mt-2 text-sm text-slate-200">' + descricao + '</p>'
          + '</div><div class="p-5">'
          + '<p class="mb-2 text-xs font-semibold uppercase tracking-wide text-blue-600">Anúncio observado</p>'
          + '<h3 class="text-lg font-bold leading-snug text-gray-900">' + titulo + '</h3>'
          + '<p class="mt-2 truncate text-sm text-gray-500">' + dominio + '</p>'
          + '<p class="mt-3 text-xs font-medium text-gray-500">' + contexto + '</p>'
          + '<div class="mt-4 flex items-center justify-between gap-3 border-t border-gray-100 pt-4">'
          + '<span class="text-xs text-gray-400">' + data + '</span>'
          + linkLanding
          + '</div></div></article>';
      }).join("");
    }

    async function carregarObservacoes(searchRunId = null) {
      const requisicaoId = ++sequenciaCarregamento;
      resultadosGrid.innerHTML = '<p class="col-span-full rounded-xl border border-gray-200 bg-white p-5 text-sm text-gray-500 shadow-sm"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Carregando observações...</p>';

      try {
        const filtro = searchRunId ? `?search_run_id=${encodeURIComponent(searchRunId)}` : "";
        const resposta = await fetch(API_BASE_URL + "/api/radar/observations" + filtro);
        if (!resposta.ok) {
          if (requisicaoId !== sequenciaCarregamento) {
            return { ok: false, cancelada: true };
          }
          if (resposta.status === 404 && searchRunId) {
            if (searchRunAtualId === searchRunId) {
              searchRunAtualId = null;
              sessionStorage.removeItem("pfaRadarSearchRunId");
            }
            atualizarCabecalho();
            renderizarObservacoes([], "A pesquisa anterior não está mais disponível. Faça uma nova pesquisa.");
            return { ok: false, removida: true };
          }
          throw new Error("Não foi possível carregar as observações.");
        }
        const dados = await resposta.json();
        if (requisicaoId !== sequenciaCarregamento) {
          return { ok: false, cancelada: true };
        }
        const observacoes = Array.isArray(dados.observations) ? dados.observations : [];
        if (searchRunId) {
          atualizarCabecalho(dados.search_run, observacoes.length);
        }
        renderizarObservacoes(
          observacoes,
          searchRunId
            ? "Nenhum anúncio foi observado nesta pesquisa."
            : "Ainda não há observações no histórico.",
        );
        return { ok: true, total: observacoes.length };
      } catch (erro) {
        if (requisicaoId !== sequenciaCarregamento) {
          return { ok: false, cancelada: true };
        }
        resultadosGrid.innerHTML = '<p class="col-span-full rounded-xl border border-red-200 bg-red-50 p-5 text-sm text-red-700">' + escaparHtml(erro.message) + '</p>';
        return { ok: false, erro };
      }
    }

    async function selecionarModo(novoModo) {
      modoAtivo = novoModo;
      atualizarAbas();
      atualizarCabecalho();

      if (modoAtivo === "atual") {
        if (!searchRunAtualId) {
          sequenciaCarregamento += 1;
          renderizarObservacoes([], "Faça uma pesquisa para visualizar os resultados atuais.");
          return { ok: true, total: 0 };
        }
        return carregarObservacoes(searchRunAtualId);
      }

      return carregarObservacoes();
    }

    botaoMapear.addEventListener("click", async () => {
      const servico = document.getElementById("servico").value;
      const cidade = document.getElementById("cidade").value;
      const dispositivo = document.getElementById("dispositivo").value;

      botaoMapear.disabled = true;
      botaoMapear.setAttribute("aria-busy", "true");
      botaoMapear.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processando...';
      mostrarStatus("Varredura em andamento. Aguarde a coleta dos anúncios e landing pages.", "processando");

      try {
        const resposta = await fetch(API_BASE_URL + "/api/radar/scan", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            keyword: servico,
            location: cidade,
            device: dispositivo.toLowerCase(),
          }),
        });

        if (!resposta.ok) {
          throw new Error("Não foi possível concluir a varredura.");
        }

        const dados = await resposta.json();
        const novoSearchRunId = Number(dados.search_run_id);
        if (!Number.isSafeInteger(novoSearchRunId) || novoSearchRunId <= 0) {
          throw new Error("A API não retornou um identificador de pesquisa válido.");
        }
        searchRunAtualId = novoSearchRunId;
        sessionStorage.setItem("pfaRadarSearchRunId", String(searchRunAtualId));
        const carregamento = await selecionarModo("atual");
        if (!carregamento.ok) {
          throw new Error("A varredura foi salva, mas os resultados não puderam ser carregados.");
        }
        mostrarStatus(`Varredura concluída: ${carregamento.total} anúncios exibidos nesta pesquisa.`);
      } catch (erro) {
        mostrarStatus(`Falha na varredura: ${erro.message}`, "erro");
      } finally {
        botaoMapear.disabled = false;
        botaoMapear.setAttribute("aria-busy", "false");
        botaoMapear.innerHTML = `${iconeOriginal} Mapear Concorrência`;
      }
    });

    abaAtual.addEventListener("click", () => selecionarModo("atual"));
    abaHistorico.addEventListener("click", () => selecionarModo("historico"));
    selecionarModo(modoAtivo);
  </script>
</body>
</html>
